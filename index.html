<!doctype html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>內湖國小教師手冊</title>
  <style>
    :root {
      --ink: #203044;
      --navy: #17375e;
      --navy-2: #24496f;
      --blue-soft: #eef4f8;
      --cream: #f7f1e7;
      --paper: #fffdf8;
      --line: #d9e0e3;
      --muted: #6c7782;
      --sage: #6f8372;
      --gold: #b28b45;
      --white: #ffffff;
      --shadow: 0 16px 40px rgba(32, 48, 68, 0.08);
      --radius: 8px;
      --max: 1320px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(23, 55, 94, 0.06), rgba(247, 241, 231, 0.42) 34%, #fbfaf6 100%),
        var(--cream);
      font-family: "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", system-ui, sans-serif;
      line-height: 1.75;
    }

    a {
      color: var(--navy);
      text-decoration-color: rgba(23, 55, 94, 0.35);
      text-underline-offset: 0.18em;
    }

    a:hover,
    a:focus-visible {
      color: var(--navy-2);
      text-decoration-color: currentColor;
    }

    button,
    a {
      -webkit-tap-highlight-color: transparent;
    }

    .page-shell {
      min-height: 100vh;
    }

    .site-header {
      background: var(--navy);
      color: var(--white);
      border-bottom: 5px solid var(--gold);
    }

    .header-inner {
      width: min(var(--max), calc(100% - 40px));
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 28px;
      align-items: center;
      padding: 42px 0 36px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 12px;
      color: rgba(255, 255, 255, 0.78);
      font-size: 0.92rem;
      letter-spacing: 0;
    }

    .eyebrow::before {
      content: "";
      width: 34px;
      height: 1px;
      background: var(--gold);
      display: inline-block;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.1rem);
      line-height: 1.22;
      font-weight: 800;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 14px 0 0;
      color: rgba(255, 255, 255, 0.86);
      font-size: clamp(1rem, 2vw, 1.2rem);
    }

    .beta-badge {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      margin: 18px 0 0;
      padding: 7px 12px;
      border: 1px solid rgba(242, 207, 141, 0.42);
      border-radius: 999px;
      background: rgba(255, 253, 248, 0.1);
      color: rgba(255, 255, 255, 0.84);
      font-size: 0.92rem;
      font-weight: 700;
      line-height: 1.45;
    }

    .header-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
    }

    .primary-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 50px;
      padding: 10px 18px;
      border: 1px solid rgba(242, 207, 141, 0.72);
      border-radius: var(--radius);
      background: #f2cf8d;
      color: #17375e;
      font-weight: 800;
      line-height: 1.45;
      text-decoration: none;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.14);
    }

    .primary-link:hover,
    .primary-link:focus-visible {
      color: #0f2948;
      background: #f7d99f;
      text-decoration: none;
    }

    .primary-link:focus-visible,
    .chapter-button:focus-visible {
      outline: 3px solid rgba(178, 139, 69, 0.35);
      outline-offset: 2px;
    }

    .header-mark {
      width: 178px;
      height: 118px;
      color: rgba(255, 255, 255, 0.88);
    }

    .main-layout {
      width: min(var(--max), calc(100% - 40px));
      margin: 34px auto 56px;
      display: grid;
      grid-template-columns: 312px minmax(0, 1fr);
      gap: 28px;
      align-items: start;
    }

    .side-nav {
      position: sticky;
      top: 18px;
      padding: 18px;
      background: rgba(255, 253, 248, 0.92);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .nav-title {
      margin: 0 0 14px;
      font-size: 0.94rem;
      color: var(--muted);
      font-weight: 700;
    }

    .chapter-list {
      display: grid;
      gap: 8px;
    }

    .chapter-button {
      width: 100%;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      min-height: 48px;
      padding: 12px 12px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: transparent;
      color: var(--ink);
      font: inherit;
      line-height: 1.45;
      text-align: left;
      cursor: pointer;
    }

    .chapter-button:hover {
      background: var(--blue-soft);
    }

    .chapter-button.is-active {
      background: var(--navy);
      border-color: var(--navy);
      color: var(--white);
    }

    .chapter-number {
      font-weight: 800;
      color: var(--gold);
      font-size: 0.9rem;
      white-space: nowrap;
    }

    .chapter-button.is-active .chapter-number {
      color: #f2cf8d;
    }

    .chapter-name {
      overflow-wrap: anywhere;
    }

    .content-card {
      width: 100%;
      max-width: 980px;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      line-height: 1.88;
    }

    .chapter-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: center;
      padding: 30px 34px;
      background: linear-gradient(180deg, #ffffff, #f9f6ee);
      border-bottom: 1px solid var(--line);
    }

    .chapter-kicker {
      margin: 0 0 6px;
      color: var(--sage);
      font-weight: 800;
      font-size: 0.92rem;
    }

    h2 {
      margin: 0;
      font-size: clamp(1.55rem, 2.5vw, 2.15rem);
      line-height: 1.35;
      letter-spacing: 0;
    }

    .chapter-status {
      justify-self: end;
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 4px 12px;
      border-radius: 999px;
      background: #edf3ef;
      color: #506b58;
      border: 1px solid #d2ddd5;
      font-size: 0.88rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .section-grid {
      display: grid;
      gap: 1px;
      background: var(--line);
    }

    .info-section {
      display: grid;
      grid-template-columns: 172px minmax(0, 1fr);
      gap: 28px;
      padding: 28px 34px;
      background: var(--paper);
    }

    .info-section h3 {
      margin: 0;
      color: var(--navy);
      font-size: 1rem;
      line-height: 1.5;
      letter-spacing: 0;
    }

    .info-section p,
    .info-section ul {
      margin: 0;
      line-height: 1.9;
    }

    .info-section ul {
      padding-left: 1.25em;
    }

    .info-section li + li {
      margin-top: 10px;
    }

    .todo {
      display: inline-block;
      margin-right: 6px;
      padding: 0 7px;
      border-radius: 5px;
      background: #f4ead8;
      color: #7b5a20;
      font-size: 0.82em;
      font-weight: 800;
      vertical-align: 0.04em;
    }

    .link-list {
      display: grid;
      gap: 10px;
      padding: 0;
      list-style: none;
    }

    .link-list li {
      margin: 0;
    }

    .link-list a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 3px 0;
      font-weight: 700;
    }

    .link-list a::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gold);
      flex: 0 0 auto;
    }

    .footer-note {
      width: min(var(--max), calc(100% - 40px));
      margin: -26px auto 36px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .site-footer {
      width: min(var(--max), calc(100% - 40px));
      margin: 0 auto 38px;
      padding: 20px 0 0;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.9rem;
    }

    .site-footer p {
      margin: 0;
    }

    .site-footer p + p {
      margin-top: 4px;
    }

    @media (max-width: 900px) {
      .header-inner {
        grid-template-columns: 1fr;
        gap: 22px;
        padding: 34px 0 30px;
      }

      .header-mark {
        width: 150px;
        height: 96px;
        justify-self: start;
      }

      .main-layout {
        grid-template-columns: 1fr;
        gap: 18px;
        margin-top: 22px;
      }

      .side-nav {
        position: static;
        padding: 14px;
      }

      .chapter-list {
        display: flex;
        gap: 10px;
        overflow-x: auto;
        padding-bottom: 8px;
        scroll-snap-type: x proximity;
        -webkit-overflow-scrolling: touch;
      }

      .chapter-button {
        min-width: 214px;
        min-height: 56px;
        scroll-snap-align: start;
      }

      .chapter-header {
        grid-template-columns: 1fr;
        padding: 24px 24px;
      }

      .chapter-status {
        justify-self: start;
      }

      .info-section {
        grid-template-columns: 1fr;
        gap: 10px;
        padding: 24px;
      }
    }

    @media (max-width: 540px) {
      .header-inner,
      .main-layout,
      .footer-note,
      .site-footer {
        width: min(100% - 20px, var(--max));
      }

      .site-header {
        border-bottom-width: 4px;
      }

      .header-inner {
        padding: 28px 0 26px;
      }

      h1 {
        font-size: 1.82rem;
        line-height: 1.28;
      }

      .subtitle {
        margin-top: 12px;
        font-size: 0.98rem;
        line-height: 1.65;
      }

      .beta-badge {
        width: 100%;
        border-radius: var(--radius);
        padding: 8px 10px;
        font-size: 0.86rem;
      }

      .primary-link {
        width: 100%;
        min-height: 54px;
        padding: 11px 14px;
      }

      .header-mark {
        display: none;
      }

      .chapter-button {
        min-width: 196px;
        min-height: 56px;
        padding: 12px;
      }

      h2 {
        font-size: 1.42rem;
      }

      .chapter-status {
        min-height: 32px;
        white-space: normal;
      }

      .chapter-header,
      .info-section {
        padding-left: 16px;
        padding-right: 16px;
      }

      .info-section {
        gap: 12px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      html {
        scroll-behavior: auto;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <header class="site-header">
      <div class="header-inner">
        <div>
          <p class="eyebrow">內湖國小校內工作手冊</p>
          <h1>內湖國小教師手冊</h1>
          <p class="subtitle">從日常流程到重要提醒，找到在內湖工作的方向</p>
          <p class="beta-badge">測試版｜內容建置中，將依各處室提供資料持續更新</p>
          <div class="header-actions">
            <a class="primary-link" href="https://padlet.com/scarlet25452/padlet-hn1ztninyrdi4gns" target="_blank" rel="noopener">前往教師常用網 Padlet</a>
          </div>
        </div>
        <svg class="header-mark" viewBox="0 0 220 148" role="img" aria-label="校園與行政流程示意">
          <path d="M18 121h184" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round" opacity=".55"></path>
          <path d="M36 112V62l74-34 74 34v50" fill="none" stroke="currentColor" stroke-width="7" stroke-linejoin="round"></path>
          <path d="M62 112V76h32v36M126 112V76h32v36" fill="none" stroke="currentColor" stroke-width="6" stroke-linejoin="round" opacity=".86"></path>
          <path d="M89 52h42M110 34v36" fill="none" stroke="#f2cf8d" stroke-width="6" stroke-linecap="round"></path>
          <circle cx="40" cy="35" r="10" fill="#f2cf8d" opacity=".92"></circle>
          <path d="M174 28c10 8 16 20 16 34" fill="none" stroke="#f2cf8d" stroke-width="5" stroke-linecap="round" opacity=".85"></path>
        </svg>
      </div>
    </header>

    <main class="main-layout">
      <nav class="side-nav" aria-label="章節目錄">
        <p class="nav-title">流程目錄</p>
        <div class="chapter-list" id="chapterList" role="tablist" aria-orientation="vertical"></div>
      </nav>

      <article class="content-card" aria-live="polite">
        <header class="chapter-header">
          <div>
            <p class="chapter-kicker" id="chapterKicker"></p>
            <h2 id="chapterTitle"></h2>
          </div>
          <span class="chapter-status" id="chapterStatus"></span>
        </header>
        <div class="section-grid" id="chapterContent"></div>
      </article>
    </main>

    <p class="footer-note">本手冊提供校內常用流程、入口與提醒。涉及法規判斷、通報、個資或內部流程時，請以承辦處室最新公告為準。</p>
    <footer class="site-footer">
      <p>COPYRIGHT © 2026 HSINCHU NEI HU PRIMARY SCHOOL</p>
      <p>維護：總務主任 江志宏</p>
      <p>Email：<a href="mailto:smallcannon@nhps.hc.edu.tw">smallcannon@nhps.hc.edu.tw</a></p>
      <p>Tel：03-5373184#130</p>
    </footer>
  </div>

  <script>
    const sectionLabels = [
      "項目說明",
      "適用情境",
      "辦理方式",
      "注意事項",
      "承辦單位",
      "相關資源"
    ];

    const padletUrl = "https://padlet.com/scarlet25452/padlet-hn1ztninyrdi4gns";
    const handbookApiUrl = "https://nhps-teacher-handbook-api.smallcannon.workers.dev?action=getHandbook";

    const chapters = [
      {
        id: "week-one",
        number: "01",
        title: "新進教師第一週",
        status: "入校起步",
        content: {
          "項目說明": "協助新進教師先掌握三類資訊：114學年度行事曆、行政處室分工與教師常用入口，讓第一週能快速知道該看哪裡、問哪裡、先完成哪些事。",
          "適用情境": "報到前後、開學準備日、第一次進班、第一次參加校務或學年會議，以及不確定某項工作應洽詢哪個處室時使用。",
          "辦理方式": ["查看 114學年度全校行事曆與教師版行事曆，先掌握開學、會議、研習與重要活動。", "對照行政處室工作職掌，確認課務、學生生活、場地設備、帳號系統等問題應洽詢的承辦處室。", "與學年夥伴確認任課、教室、班級例行事項與共備方式。", "將 Padlet 教師常用網加入書籤，作為日常查詢入口。"],
          "注意事項": ["行事曆與處室公告可能更新，辦理前請以最新公告或承辦處室說明為準。", "本手冊提供方向與入口，不取代各處室正式公告。", "涉及個人資料、內部簽核或尚未公告事項，不放入網站內容，請直接洽承辦處室。"],
          "承辦單位": "人事室、教務處、學務處、總務處、資訊組與所屬學年主任。實際承辦人與分機請依 114學年度行政處室工作職掌或最新公告確認。",
          "相關資源": [{ label: "Padlet 教師常用網", url: padletUrl }, { label: "114學年度行事曆與處室工作職掌（請於 Padlet 查詢最新版）", url: padletUrl }]
        }
      },
      {
        id: "campus-safety",
        number: "02",
        title: "校園空間與安全",
        status: "安全基礎",
        content: {
          "項目說明": "整理校園日常使用與共同生活提醒，包含主要空間、公共設備、班級移動、行動載具使用與遇到疑問時的詢問窗口。",
          "適用情境": "帶班級移動、使用公共空間、借用設備、處理學生行動載具或特殊物品、需要確認校園日常規範時使用。",
          "辦理方式": ["先熟悉教室、辦公室、健康中心、警衛室、總務處與常用公共空間。", "校園日常管理以安全、尊重與共同秩序為原則；具體規範請依學務處最新公告。", "學生使用行動載具、特殊物品或公共設備時，先確認校內規範與班級管理方式。", "遇到需要行政判斷的狀況，請洽學務處、總務處或相關承辦單位。"],
          "注意事項": ["本章只放日常提醒與詢問入口，不放高風險事件處理細節。", "校園空間、動線、門禁、公共設備等規範可能依年度調整，請以承辦處室最新說明為準。", "遇到緊急或需立即協助的狀況，先確保現場安全，再依學校正式流程聯繫相關處室。"],
          "承辦單位": "學務處、總務處、警衛室、健康中心。校園空間與設備問題通常洽總務處，學生生活與日常規範通常洽學務處。",
          "相關資源": [{ label: "Padlet 教師常用網", url: padletUrl }, { label: "校園日常規範與空間資訊（請於 Padlet 查詢最新版）", url: padletUrl }]
        }
      },
      {
        id: "academic-affairs",
        number: "03",
        title: "教務工作",
        status: "課務教學",
        content: {
          "項目說明": "彙整教師日常教務入口，包含課程發展、公開授課、教學巡視、教科書選用與校外人士協助教學或活動等流程提醒。",
          "適用情境": "需要查詢課程文件、公開授課與觀議課安排、教科書相關作業、校外人士協助教學或活動申請，以及確認教務處公告時使用。",
          "辦理方式": ["課程、公開授課、教科書與校外人士協助教學相關事項，先查教務處公告或 Padlet 入口。", "需要申請校外人士協助教學或活動時，先確認要點、申請表與入校須知，再洽教務處。", "教科書選用、循環使用與教學巡視，依教務處最新期程與表單辦理。", "遇到教務流程不確定時，先確認來源年度與承辦單位，不自行引用舊表單。"],
          "注意事項": ["本章提供流程入口，不完整轉載各項辦法。", "教務文件若涉及個別資料、評量細節或學生資料，不放入網站，請直接洽承辦處室。", "表單與期程可能更新，正式辦理前請以 114學年度教務處公告為準。"],
          "承辦單位": "教務處各組與資訊組。課程、公開授課、教科書、校外人士協助教學等事項，請依教務處最新分工洽詢。",
          "相關資源": [{ label: "Padlet 教師常用網", url: padletUrl }, { label: "教務表單與教務公告（請於 Padlet 查詢最新版）", url: padletUrl }]
        }
      },
      {
        id: "student-affairs",
        number: "04",
        title: "學務與學生事件",
        status: "事件處理",
        content: {
          "項目說明": "提供學生生活事件、衝突、傷病、重大疑慮與需行政協助狀況的初步分流方向。本章僅作入口提醒，不取代正式通報或承辦處室判斷。",

    const chapterList = document.getElementById("chapterList");
    const chapterKicker = document.getElementById("chapterKicker");
    const chapterTitle = document.getElementById("chapterTitle");
    const chapterStatus = document.getElementById("chapterStatus");
    const chapterContent = document.getElementById("chapterContent");
    let handbookChapters = chapters;
    let handbookSectionLabels = sectionLabels;
    let navigationEventsBound = false;

    function contentToHtml(value) {
      if (Array.isArray(value)) {
        return "<ul>" + value.map((item) => "<li>" + item + "</li>").join("") + "</ul>";
      }

      if (typeof value === "string" && value.split("\n").some((line) => line.trim().indexOf("- ") === 0)) {
        const items = value.split("\n").filter((line) => line.trim()).map((line) => line.replace(/^\s*-\s*/, ""));
        return "<ul>" + items.map((item) => "<li>" + item + "</li>").join("") + "</ul>";
      }

      return "<p>" + value + "</p>";
    }

    function linksToHtml(links) {
      if (!Array.isArray(links) || links.length === 0) return "<p>暫無相關資源。</p>";
      return "<ul class='link-list'>" + links.map((link) => (
        "<li><a href='" + String(link.url || "#") + "'" + (String(link.url || "").indexOf("http") === 0 ? " target='_blank' rel='noopener'" : "") + ">" + String(link.label || "未命名連結") + "</a></li>"
      )).join("") + "</ul>";
    }

    function formatChapterNumber(value) {
      const text = String(value || "").trim();
      return /^\d$/.test(text) ? "0" + text : text;
    }

    function hasMeaningfulContent(value, isLinks) {
      if (isLinks) return Array.isArray(value) && value.length > 0;
      if (Array.isArray(value)) return value.some((item) => String(item || "").trim());
      return String(value || "").trim().length > 0;
    }

    function hasChapterContent(chapter) {
      if (!chapter) return false;
      if (Array.isArray(chapter.blocks) && chapter.blocks.some((block) => (
        hasMeaningfulContent(block.key === "相關資源" ? block.links : block.body, block.key === "相關資源")
      ))) {
        return true;
      }
      return Object.keys(chapter.content || {}).some((label) => (
        hasMeaningfulContent(chapter.content[label], label === "相關資源")
      ));
    }

    function mergeWithStaticFallback(dynamicChapters) {
      return dynamicChapters.map((chapter) => {
        if (hasChapterContent(chapter)) return chapter;
        const fallback = chapters.find((item) => item.id === chapter.id || formatChapterNumber(item.number) === formatChapterNumber(chapter.number));
        if (!fallback) return chapter;
        return {
          ...fallback,
          id: chapter.id || fallback.id,
          number: chapter.number || fallback.number,
          title: chapter.title || fallback.title,
          status: chapter.status || fallback.status
        };
      });
    }

    function getChapterSections(chapter) {
      if (Array.isArray(chapter.blocks) && chapter.blocks.length > 0) {
        return chapter.blocks.map((block) => ({
          label: block.title || block.key,
          value: block.key === "相關資源" ? block.links : block.body,
          isLinks: block.key === "相關資源"
        }));
      }

      const extraLabels = Object.keys(chapter.content || {}).filter((label) => handbookSectionLabels.indexOf(label) < 0);
      return handbookSectionLabels.concat(extraLabels).map((label) => ({
        label,
        value: chapter.content[label],
        isLinks: label === "相關資源"
      }));
    }

    function renderChapter(chapterId, shouldFocus) {
      const chapter = handbookChapters.find((item) => item.id === chapterId) || handbookChapters[0];
      if (!chapter) return;

      document.querySelectorAll(".chapter-button").forEach((button) => {
        const isActive = button.dataset.chapterId === chapter.id;
        button.classList.toggle("is-active", isActive);
        button.setAttribute("aria-selected", String(isActive));
        button.tabIndex = isActive ? 0 : -1;
      });

      chapterKicker.textContent = formatChapterNumber(chapter.number) + " 工作流程";
      chapterTitle.textContent = chapter.title;
      chapterStatus.textContent = chapter.status;

      chapterContent.innerHTML = getChapterSections(chapter).map((section) => {
        const body = section.isLinks
          ? linksToHtml(section.value)
          : contentToHtml(section.value || "");

        return "<section class='info-section'>" +
          "<h3>" + section.label + "</h3>" +
          "<div>" + body + "</div>" +
        "</section>";
      }).join("");

      if (location.hash !== "#" + chapter.id) {
        history.replaceState(null, "", "#" + chapter.id);
      }

      if (shouldFocus) {
        document.querySelector(".content-card").scrollIntoView({ block: "start", behavior: "smooth" });
      }
    }

    function buildNavigation() {
      chapterList.innerHTML = handbookChapters.map((chapter) => (
        "<button class='chapter-button' type='button' role='tab' data-chapter-id='" + chapter.id + "'>" +
          "<span class='chapter-number'>" + formatChapterNumber(chapter.number) + "</span>" +
          "<span class='chapter-name'>" + chapter.title + "</span>" +
        "</button>"
      )).join("");

      if (navigationEventsBound) return;
      navigationEventsBound = true;

      chapterList.addEventListener("click", (event) => {
        const button = event.target.closest(".chapter-button");
        if (!button) return;
        renderChapter(button.dataset.chapterId, window.matchMedia("(max-width: 900px)").matches);
      });

      chapterList.addEventListener("keydown", (event) => {
        const current = event.target.closest(".chapter-button");
        if (!current) return;

        const buttons = Array.from(document.querySelectorAll(".chapter-button"));
        const currentIndex = buttons.indexOf(current);
        const keyMap = {
          ArrowDown: 1,
          ArrowRight: 1,
          ArrowUp: -1,
          ArrowLeft: -1
        };

        if (!(event.key in keyMap)) return;
        event.preventDefault();

        const nextIndex = (currentIndex + keyMap[event.key] + buttons.length) % buttons.length;
        buttons[nextIndex].focus();
        renderChapter(buttons[nextIndex].dataset.chapterId, false);
      });
    }

    function applyDynamicHandbook(data) {
      if (!data || data.ok !== true || !Array.isArray(data.chapters) || data.chapters.length === 0) return false;
      handbookSectionLabels = Array.isArray(data.section_labels) && data.section_labels.length > 0
        ? data.section_labels
        : sectionLabels;
      handbookChapters = mergeWithStaticFallback(data.chapters);
      buildNavigation();
      renderChapter((location.hash || "").replace("#", ""), false);
      return true;
    }

    async function loadDynamicHandbook() {
      try {
        const response = await fetch(handbookApiUrl, { method: "GET", headers: { "Accept": "application/json" } });
        const data = await response.json();
        applyDynamicHandbook(data);
      } catch (err) {
        handbookChapters = chapters;
        handbookSectionLabels = sectionLabels;
      }
    }

    buildNavigation();
    renderChapter((location.hash || "").replace("#", ""), false);
    loadDynamicHandbook();
  </script>
