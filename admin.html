<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>教師手冊維護中</title>
  <style>
    :root {
      color-scheme: light;
      --navy: #153a63;
      --navy-dark: #0d2a49;
      --cream: #f7f1e5;
      --paper: #fffdf8;
      --ink: #22313f;
      --muted: #647383;
      --line: rgba(21, 58, 99, 0.14);
      --shadow: 0 22px 54px rgba(13, 42, 73, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      min-height: 100vh;
      padding: 28px;
      place-items: center;
      background:
        linear-gradient(135deg, rgba(21, 58, 99, 0.96), rgba(13, 42, 73, 0.94)),
        var(--navy);
      color: var(--ink);
      font-family: "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.75;
    }

    main {
      width: min(720px, 100%);
    }

    .maintenance-card {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--paper);
      box-shadow: var(--shadow);
    }

    .card-header {
      padding: 30px clamp(24px, 6vw, 48px);
      background: var(--cream);
      border-bottom: 1px solid var(--line);
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    h1 {
      margin: 0;
      color: var(--navy-dark);
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.22;
      letter-spacing: 0;
    }

    .card-body {
      padding: clamp(26px, 6vw, 48px);
    }

    .message {
      margin: 0;
      color: var(--ink);
      font-size: clamp(1.05rem, 2.8vw, 1.18rem);
      font-weight: 650;
    }

    .message + .message {
      margin-top: 14px;
    }

    .note {
      margin: 28px 0 0;
      padding-top: 22px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 1rem;
      font-weight: 700;
    }

    footer {
      margin-top: 22px;
      color: rgba(255, 255, 255, 0.78);
      font-size: 0.95rem;
      text-align: center;
    }

    @media (max-width: 560px) {
      body {
        padding: 18px;
        align-items: start;
      }

      .maintenance-card {
        border-radius: 18px;
      }

      .card-header,
      .card-body {
        padding-left: 22px;
        padding-right: 22px;
      }

      .message {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <main aria-labelledby="maintenance-title">
    <article class="maintenance-card">
      <header class="card-header">
        <p class="eyebrow">系統公告</p>
        <h1 id="maintenance-title">教師手冊維護中</h1>
      </header>
      <section class="card-body" aria-label="維護中說明">
        <p class="message">本系統目前暫停開放使用。</p>
        <p class="message">校內相關表件、規定與行政資訊，請暫依各處室正式公告、群組通知或既有校務流程辦理。</p>
        <p class="message">需要查詢資料時，請多利用學校網頁或學務處的教師常用網站連結。</p>
        <p class="note">造成不便，敬請見諒。</p>
      </section>
    </article>
    <footer>內湖國小</footer>
  </main>
</body>
</html>
