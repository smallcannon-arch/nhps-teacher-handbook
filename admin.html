<!doctype html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>內湖國小教師手冊後台</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      --ink: #203044;
      --navy: #17375e;
      --cream: #f7f1e7;
      --paper: #fffdf8;
      --line: #d9e0e3;
      --muted: #6c7782;
      --gold: #b28b45;
      --danger: #8b3a3a;
      --ok: #3f6f50;
      --radius: 8px;
      --shadow: 0 14px 34px rgba(32, 48, 68, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background: linear-gradient(180deg, rgba(23, 55, 94, 0.06), #fbfaf6 45%), var(--cream);
      font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
      line-height: 1.7;
    }

    header {
      background: var(--navy);
      color: white;
      border-bottom: 5px solid var(--gold);
    }

    .header-inner,
    main,
    footer {
      width: min(1280px, calc(100% - 32px));
      margin: 0 auto;
    }

    .header-inner {
      display: grid;
      gap: 12px;
      padding: 28px 0;
    }

    h1,
    h2,
    h3,
    p { margin-top: 0; }

    h1 {
      margin-bottom: 0;
      font-size: clamp(1.8rem, 3vw, 2.6rem);
      line-height: 1.25;
    }

    .badge {
      display: inline-flex;
      width: fit-content;
      padding: 5px 10px;
      border: 1px solid rgba(242, 207, 141, 0.42);
      border-radius: 999px;
      color: rgba(255, 255, 255, 0.84);
      font-weight: 700;
      font-size: 0.9rem;
    }

    main {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      gap: 24px;
      padding: 28px 0 48px;
    }

    .panel {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .sidebar {
      position: sticky;
      top: 18px;
      align-self: start;
      padding: 16px;
    }

    .content {
      padding: 22px;
    }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 14px;
    }

    label {
      color: var(--navy);
      font-weight: 800;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: white;
      color: var(--ink);
      font: inherit;
      padding: 10px 12px;
    }

    textarea {
      min-height: 130px;
      resize: vertical;
    }

    button {
      min-height: 44px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: var(--navy);
      color: white;
      font: inherit;
      font-weight: 800;
      padding: 9px 14px;
      cursor: pointer;
    }

    button.secondary {
      background: white;
      color: var(--navy);
      border-color: var(--line);
    }

    button.warn {
      background: var(--danger);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.48;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .chapter-button {
      width: 100%;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
      background: transparent;
      border-color: transparent;
      color: var(--ink);
      text-align: left;
    }

    .chapter-button.is-active {
      background: var(--navy);
      color: white;
    }

    .chapter-number {
      color: var(--gold);
      font-weight: 900;
    }

    .meta {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .notice {
      padding: 12px 14px;
      border: 1px solid #d2ddd5;
      border-radius: var(--radius);
      background: #edf3ef;
      color: var(--ok);
      font-weight: 700;
    }

    .error {
      border-color: #ead0d0;
      background: #fbefef;
      color: var(--danger);
    }

    .safety-note {
      padding: 10px 12px;
      border: 1px solid #e3d6bc;
      border-radius: var(--radius);
      background: #fbf7ee;
      color: #665335;
      font-size: 0.9rem;
      line-height: 1.7;
    }

    .publish-note {
      margin-top: 16px;
    }

    .block {
      padding: 16px 0;
      border-top: 1px solid var(--line);
    }

    .block-grid {
      display: grid;
      grid-template-columns: 1fr 160px 180px;
      gap: 12px;
      align-items: end;
    }

    .status-display {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      width: fit-content;
      max-width: 100%;
      border: 1px solid #d2ddd5;
      border-radius: 999px;
      background: #edf3ef;
      color: var(--ok);
      font-weight: 800;
      padding: 8px 14px;
    }

    .block .block-grid {
      grid-template-columns: minmax(0, 1fr);
      align-items: start;
    }

    .link-row {
      display: grid;
      grid-template-columns: 1fr 1.4fr auto;
      gap: 8px;
      margin-bottom: 8px;
    }

    footer {
      color: var(--muted);
      font-size: 0.9rem;
      padding-bottom: 30px;
    }

    @media (max-width: 860px) {
      main {
        grid-template-columns: 1fr;
        width: min(100% - 20px, 1280px);
      }

      .sidebar {
        position: static;
      }

      .chapter-list {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding-bottom: 8px;
      }

      .chapter-button {
        min-width: 200px;
        min-height: 54px;
      }

      .block-grid,
      .link-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <span class="badge">原型版｜請先在測試試算表操作</span>
      <h1>內湖國小教師手冊後台</h1>
      <p class="meta">草稿、送審、發布與快取版本更新的管理介面雛形。</p>
      <div id="gsiButton"></div>
    </div>
  </header>

  <main>
    <aside class="panel sidebar">
      <h2>章節</h2>
      <p class="meta" id="loginState">尚未登入</p>
      <button id="addChapterBtn" type="button" class="secondary" disabled>新增章節</button>
      <div class="chapter-list" id="chapterList"></div>
    </aside>

    <section class="panel content">
      <div id="message" class="notice" hidden></div>
      <h2 id="chapterTitle">請先登入並載入章節</h2>
      <p class="meta" id="chapterMeta"></p>
      <div class="block-grid">
        <div class="field">
          <label>章節名稱</label>
          <input id="chapterTitleInput" placeholder="章節名稱">
        </div>
        <div class="field">
          <label>章節編號</label>
          <input id="chapterNumberInput" placeholder="01">
        </div>
        <div class="field">
          <label>發布狀態</label>
          <div id="chapterStatusDisplay" class="status-display" aria-live="polite">尚未載入</div>
        </div>
      </div>
      <form id="editorForm"></form>
      <div class="safety-note publish-note">
        按下「發布章節」後會直接更新前台。發布前請確認內容已由相關處室確認，且不含學生個資、個案內容、成績、通報細節、採購工程、財產細節或未經確認的高風險資訊。
      </div>
      <div class="actions">
        <button id="addBlockBtn" type="button" class="secondary" disabled>新增補充小卡</button>
        <button id="saveBtn" type="button" disabled>儲存草稿</button>
        <button id="publishBtn" type="button" disabled>發布章節</button>
        <button id="withdrawBtn" type="button" class="warn" disabled>收回發布</button>
        <button id="deleteChapterBtn" type="button" class="warn" disabled>封存章節</button>
      </div>
    </section>
  </main>

  <footer>
    <p>本後台不應放入學生個資、個案內容、成績、通報細節、採購工程細節或未經確認的高風險資訊。</p>
  </footer>

  <script>
    const GAS_ENDPOINT = "https://nhps-teacher-handbook-api.smallcannon.workers.dev";
    const GOOGLE_CLIENT_ID = "179214705510-kasellaj6et3bm507ia539fd7sacujth.apps.googleusercontent.com";
    const ALLOWED_EMAIL_DOMAIN = "nhps.hc.edu.tw";
    const CORE_BLOCK_KEYS = ["項目說明", "適用情境", "辦理方式", "注意事項", "承辦單位", "相關資源"];
    let idToken = "";
    let chapters = [];
    let activeId = "";
    let currentUser = null;
    let deletedBlocks = [];

    const chapterList = document.getElementById("chapterList");
    const editorForm = document.getElementById("editorForm");
    const message = document.getElementById("message");
    const loginState = document.getElementById("loginState");
    const chapterTitle = document.getElementById("chapterTitle");
    const chapterMeta = document.getElementById("chapterMeta");
    const chapterTitleInput = document.getElementById("chapterTitleInput");
    const chapterNumberInput = document.getElementById("chapterNumberInput");
    const chapterStatusDisplay = document.getElementById("chapterStatusDisplay");

    window.onload = () => {
      if (GOOGLE_CLIENT_ID.startsWith("PASTE_")) {
        showMessage("請先設定 GOOGLE_CLIENT_ID 與 GAS_ENDPOINT。", true);
        return;
      }
      if (!window.google || !google.accounts || !google.accounts.id) {
        showMessage("Google 登入元件尚未載入完成，請重新整理頁面後再試。", true);
        return;
      }
      google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: async (response) => {
          if (!response || !response.credential) {
            idToken = "";
            loginState.textContent = "尚未完成登入";
            showMessage("尚未取得 Google 登入憑證。請確認 OAuth JavaScript 來源已加入 https://smallcannon-arch.github.io，並重新登入。", true);
            setEnabled(false);
            return;
          }
          const profile = decodeJwtPayload(response.credential);
          const email = String(profile.email || "").toLowerCase();
          const emailDomain = email.split("@").pop();
          const hostedDomain = String(profile.hd || "").toLowerCase();
          if (emailDomain !== ALLOWED_EMAIL_DOMAIN && hostedDomain !== ALLOWED_EMAIL_DOMAIN) {
            idToken = "";
            loginState.textContent = "登入帳號網域不符";
            showMessage("僅限 " + ALLOWED_EMAIL_DOMAIN + " 網域帳號登入後台。請改用學校 Google 帳號。", true);
            setEnabled(false);
            return;
          }
          idToken = response.credential;
          loginState.textContent = "已登入：" + email;
          showMessage("已取得 Google 登入憑證，正在載入後台資料。", false);
          await loadAdminData();
        }
      });
      google.accounts.id.renderButton(document.getElementById("gsiButton"), {
        theme: "outline",
        size: "large",
        text: "signin_with",
        shape: "rectangular"
      });
    };

    async function api(cmd, extra = {}) {
      if (GAS_ENDPOINT.startsWith("PASTE_")) throw new Error("尚未設定 GAS_ENDPOINT");
      if (!idToken) throw new Error("尚未完成 Google 登入，請先按 Google 登入按鈕。");
      const payload = JSON.stringify({ cmd, idToken, ...extra });
      const response = await fetch(GAS_ENDPOINT, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: "payload=" + encodeURIComponent(payload)
      }).catch((err) => {
        throw new Error("連線失敗。若目前後台 endpoint 仍是 GAS URL，請改用 Cloudflare Worker URL 代理 POST，避免瀏覽器 CORS 擋下請求。原始訊息：" + err.message);
      });
      const data = await response.json();
      if (!data.ok) throw new Error(data.error || "操作失敗");
      return data;
    }

    async function loadAdminData() {
      try {
        const data = await api("adminList");
        chapters = data.chapters || [];
        currentUser = data.user || null;
        deletedBlocks = [];
        activeId = activeId || (chapters[0] && chapters[0].id) || "";
        loginState.textContent = currentUser
          ? "已登入：" + currentUser.email + "（" + currentUser.role + "）"
          : "已登入";
        renderChapterList();
        renderEditor();
        setEnabled(true);
      } catch (err) {
        showMessage(err.message, true);
        loginState.textContent = "載入失敗";
      }
    }

    function renderChapterList() {
      chapterList.innerHTML = chapters.map((chapter) => `
        <button class="chapter-button ${chapter.id === activeId ? "is-active" : ""}" type="button" data-id="${chapter.id}">
          <span class="chapter-number">${escapeHtml(formatChapterNumber(chapter.number))}</span>
          <span>${escapeHtml(chapter.title)}</span>
        </button>
      `).join("");
    }

    function renderEditor() {
      const chapter = chapters.find((item) => item.id === activeId);
      if (!chapter) return;
      chapterTitle.textContent = `${formatChapterNumber(chapter.number)} ${chapter.title}`;
      chapterMeta.textContent = `狀態：${chapter.status}`;
      chapterTitleInput.value = chapter.title || "";
      chapterNumberInput.value = chapter.number || "";
      chapterStatusDisplay.textContent = chapter.status || "未設定";
      editorForm.innerHTML = chapter.blocks.map((block, index) => renderBlock(block, index)).join("");
    }

    function renderBlock(block, index) {
      const isCore = CORE_BLOCK_KEYS.includes(block.key);
      const links = Array.isArray(block.draft_links) ? block.draft_links : [];
      return `
        <section class="block" data-index="${index}">
          <div class="block-grid">
            <div class="field">
              <label>${escapeHtml(block.title)}</label>
              ${isCore ? "" : `<input data-field="title" value="${escapeHtml(block.title || "補充說明")}" placeholder="小卡標題">`}
              ${block.key === "相關資源"
                ? `<div class="links" data-index="${index}">${renderLinks(links)}</div><button class="secondary add-link" type="button" data-index="${index}">新增連結</button>`
                : `<textarea data-field="draft_body">${escapeHtml(block.draft_body || "")}</textarea>`}
              <div class="safety-note">
                提醒：請勿填入學生個資、個案內容、成績、通報細節、採購工程、財產細節或未經處室確認的高風險資訊。
              </div>
            </div>
          </div>
          ${isCore ? "" : `<div class="actions"><button class="secondary remove-block" type="button" data-index="${index}">移除此小卡</button></div>`}
        </section>
      `;
    }

    function renderLinks(links) {
      const rows = links.length ? links : [{ label: "", url: "" }];
      return rows.map((link) => `
        <div class="link-row">
          <input data-link="label" placeholder="連結名稱" value="${escapeHtml(link.label || "")}">
          <input data-link="url" placeholder="https://..." value="${escapeHtml(link.url || "")}">
          <button class="secondary remove-link" type="button">移除</button>
        </div>
      `).join("");
    }

    function collectBlocks() {
      const chapter = chapters.find((item) => item.id === activeId);
      return [...editorForm.querySelectorAll(".block")].map((section) => {
        const index = Number(section.dataset.index);
        const source = chapter.blocks[index];
        const draftText = section.querySelector("[data-field='draft_body']");
        const titleInput = section.querySelector("[data-field='title']");
        const links = [...section.querySelectorAll(".link-row")].map((row) => ({
          label: row.querySelector("[data-link='label']").value.trim(),
          url: row.querySelector("[data-link='url']").value.trim()
        })).filter((link) => link.label && link.url);
        return {
          block_id: source.block_id || "",
          key: source.key,
          title: titleInput ? titleInput.value.trim() : source.title,
          draft_body: draftText ? draftText.value : "",
          draft_links: source.key === "相關資源" ? links : [],
          risk_level: "低",
          owner_office: source.owner_office || "",
          deleted: false
        };
      }).concat(deletedBlocks);
    }

    async function saveDraft() {
      await runCommand("saveDraft", {
        chapter_id: activeId,
        chapter_no: chapterNumberInput.value.trim(),
        chapter_title: chapterTitleInput.value.trim(),
        blocks: collectBlocks()
      }, "已儲存草稿");
    }

    async function publishChapter() {
      await runCommand("publishChapter", { chapter_id: activeId }, "已發布章節並更新快取版本");
    }

    async function withdrawChapter() {
      await runCommand("withdrawChapter", { chapter_id: activeId }, "已收回發布並更新快取版本");
    }

    async function deleteChapter() {
      const chapter = chapters.find((item) => item.id === activeId);
      if (!chapter) return;
      const ok = window.confirm("確定要封存「" + chapter.title + "」？封存後前台不會顯示，資料仍保留在 Sheets。");
      if (!ok) return;
      await runCommand("deleteChapter", { chapter_id: activeId }, "已封存章節");
    }

    async function runCommand(cmd, payload, successText) {
      try {
        setEnabled(false);
        await api(cmd, payload);
        showMessage(successText, false);
        await loadAdminData();
      } catch (err) {
        showMessage(err.message, true);
      } finally {
        setEnabled(true);
      }
    }

    function showMessage(text, isError) {
      message.hidden = false;
      message.textContent = text;
      message.classList.toggle("error", Boolean(isError));
    }

    function setEnabled(enabled) {
      const role = currentUser && currentUser.role;
      const canEdit = ["admin", "editor", "reviewer"].includes(role);
      const canPublish = canEdit;
      const canArchive = ["admin", "reviewer"].includes(role);
      document.getElementById("addChapterBtn").disabled = !enabled || !idToken || !canEdit;
      document.getElementById("addBlockBtn").disabled = !enabled || !idToken || !canEdit;
      document.getElementById("saveBtn").disabled = !enabled || !idToken || !canEdit;
      document.getElementById("publishBtn").disabled = !enabled || !idToken || !canPublish;
      document.getElementById("withdrawBtn").disabled = !enabled || !idToken || !canArchive;
      document.getElementById("deleteChapterBtn").disabled = !enabled || !idToken || !canArchive;
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function formatChapterNumber(value) {
      const text = String(value || "").trim();
      return /^\d$/.test(text) ? "0" + text : text;
    }

    function decodeJwtPayload(token) {
      const parts = String(token || "").split(".");
      if (parts.length < 2) return {};
      try {
        const base64 = parts[1].replace(/-/g, "+").replace(/_/g, "/");
        const padded = base64 + "=".repeat((4 - base64.length % 4) % 4);
        const json = decodeURIComponent(Array.from(atob(padded)).map((char) => {
          return "%" + char.charCodeAt(0).toString(16).padStart(2, "0");
        }).join(""));
        return JSON.parse(json);
      } catch (err) {
        return {};
      }
    }

    chapterList.addEventListener("click", (event) => {
      const button = event.target.closest(".chapter-button");
      if (!button) return;
      activeId = button.dataset.id;
      deletedBlocks = [];
      renderChapterList();
      renderEditor();
    });

    editorForm.addEventListener("click", (event) => {
      if (event.target.classList.contains("add-link")) {
        const box = event.target.previousElementSibling;
        box.insertAdjacentHTML("beforeend", renderLinks([{ label: "", url: "" }]));
      }
      if (event.target.classList.contains("remove-link")) {
        event.target.closest(".link-row").remove();
      }
      if (event.target.classList.contains("remove-block")) {
        const chapter = chapters.find((item) => item.id === activeId);
        const index = Number(event.target.dataset.index);
        const block = chapter.blocks[index];
        if (block && block.block_id) {
          deletedBlocks.push({
            block_id: block.block_id,
            key: block.key,
            title: block.title,
            deleted: true
          });
        }
        chapter.blocks.splice(index, 1);
        renderEditor();
      }
    });

    document.getElementById("addBlockBtn").addEventListener("click", () => {
      const chapter = chapters.find((item) => item.id === activeId);
      if (!chapter) return;
      const current = collectBlocks().filter((block) => !block.deleted).map((block, index) => ({
        block_id: block.block_id,
        key: block.key,
        title: block.title || block.key,
        draft_body: block.draft_body || "",
        draft_links: block.draft_links || [],
        risk_level: block.risk_level || "低",
        owner_office: block.owner_office || "",
        review_status: "草稿",
        sort_order: index + 1
      }));
      current.push({
        block_id: "",
        key: "custom-" + Date.now(),
        title: "補充說明",
        draft_body: "",
        draft_links: [],
        risk_level: "低",
        owner_office: "",
        review_status: "草稿",
        sort_order: current.length + 1
      });
      chapter.blocks = current;
      renderEditor();
    });

    document.getElementById("addChapterBtn").addEventListener("click", () => {
      const title = window.prompt("請輸入新章節名稱");
      if (!title) return;
      const nextNumber = String(chapters.length + 1).padStart(2, "0");
      const id = "custom-chapter-" + Date.now();
      chapters.push({
        id,
        number: nextNumber,
        title,
        status: "草稿",
        sort_order: chapters.length + 1,
        blocks: CORE_BLOCK_KEYS.map((key, index) => ({
          block_id: "",
          key,
          title: key,
          draft_body: "",
          draft_links: [],
          risk_level: "低",
          owner_office: "",
          review_status: "草稿",
          sort_order: index + 1
        }))
      });
      activeId = id;
      deletedBlocks = [];
      renderChapterList();
      renderEditor();
      showMessage("已新增章節草稿，請補內容後按「儲存草稿」。", false);
    });

    document.getElementById("saveBtn").addEventListener("click", saveDraft);
    document.getElementById("publishBtn").addEventListener("click", publishChapter);
    document.getElementById("withdrawBtn").addEventListener("click", withdrawChapter);
    document.getElementById("deleteChapterBtn").addEventListener("click", deleteChapter);
  </script>
</body>
</html>
